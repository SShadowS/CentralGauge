name: Weekly lifecycle cycle

# Plan G — runs every Monday 06:00 UTC. Identifies stale models from the
# production lifecycle event log via `lifecycle status --json`, runs
# `centralgauge cycle` for each with continue-on-error, and posts a digest
# to a sticky GitHub issue tagged `weekly-cycle-digest`.
#
# Manual trigger:
#
#   gh workflow run weekly-cycle.yml
#
# Auto-close on full success; sticky open on any per-model failure.
# Operator triages via the open issue.

on:
  schedule:
    - cron: "0 6 * * MON"
  workflow_dispatch:

permissions:
  contents: read
  issues: write # for sticky digest issue create / comment / close

# Two scheduled cycles must never run concurrently — the cycle command's
# lock-token tiebreaker would correctly serialise them, but the digest
# would double-post. cancel-in-progress=false: prefer to let an in-flight
# run finish rather than truncate it mid-cycle.
concurrency:
  group: weekly-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    # 4h hard cap. Typical 1-3 stale models complete in 30–90 min; the
    # ceiling guards against a runaway model that keeps failing
    # max_attempts in cycle.
    timeout-minutes: 240
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 22c8fbe790464b492d9b178cc0f9255b
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # Admin-scope config supplied via env (no ~/.centralgauge.yml on
      # the runner). lifecycle status / digest / cycle orchestrator all
      # consume these via mergeConfigSources → loadAdminConfig.
      CENTRALGAUGE_INGEST_URL: https://centralgauge.sshadows.workers.dev
      CENTRALGAUGE_ADMIN_KEY_ID: '4'
      # CF Access service token — bypasses the GitHub OAuth gate at the
      # edge so signed CLI requests reach the worker. The worker's
      # existing Ed25519 verification then authenticates the operation.
      # Without this, /api/v1/admin/lifecycle/* returns the CF Access
      # login page (HTML) instead of the JSON API.
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.46.x

      - name: Decode admin signing key
        id: admin-key
        run: |
          mkdir -p "$RUNNER_TEMP/cg"
          printf '%s' '${{ secrets.ADMIN_KEY_PEM }}' | base64 -d > "$RUNNER_TEMP/cg/admin_key.pem"
          chmod 600 "$RUNNER_TEMP/cg/admin_key.pem"
          echo "path=$RUNNER_TEMP/cg/admin_key.pem" >> "$GITHUB_OUTPUT"

      - name: Cache Deno deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}

      # Fail-fast precheck: validate admin config + key + connectivity
      # BEFORE the orchestrator fans out N cycle invocations. Without this,
      # a corrupted ADMIN_KEY_PEM secret causes N×failure with N×digest
      # noise — the precheck collapses that to a single failure with a
      # clear root-cause message.
      #
      # Uses `doctor admin` rather than `doctor ingest` because this
      # workflow only exercises admin-scoped commands (lifecycle status,
      # digest, sync-catalog). The Linux runner cannot run bench (no BC
      # container), so ingest credentials would be unused even if present.
      - name: Doctor admin precheck
        env:
          CENTRALGAUGE_ADMIN_KEY_PATH: ${{ steps.admin-key.outputs.path }}
          # This step IS the precheck — don't recurse via the bench-aware
          # auto-precheck that other commands run on startup.
          CENTRALGAUGE_BENCH_PRECHECK: "0"
        run: deno task start doctor admin

      - name: Run weekly cycle orchestrator
        id: cycle
        continue-on-error: true
        env:
          CENTRALGAUGE_ADMIN_KEY_PATH: ${{ steps.admin-key.outputs.path }}
          # Bench-aware doctor would gate every cycle invocation; the
          # precheck above already validated. Disable the per-cycle
          # repeat so we don't pay the doctor cost ~N times.
          CENTRALGAUGE_BENCH_PRECHECK: "0"
        run: deno run --allow-all scripts/weekly-cycle.ts

      - name: Generate digest
        id: digest
        if: always()
        env:
          CENTRALGAUGE_ADMIN_KEY_PATH: ${{ steps.admin-key.outputs.path }}
          CENTRALGAUGE_BENCH_PRECHECK: "0"
        run: |
          deno task start lifecycle digest --since 7d --format markdown > digest.md
          cat digest.md

      - name: Post or update sticky digest issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CYCLE_RESULT="${{ steps.cycle.outcome }}"
          # Build body via printf to handle multi-line markdown safely; gh
          # issue create/comment passes --body as a single arg.
          BODY=$(cat digest.md)
          BODY=$(printf '%s\n\n---\n- Workflow run: %s/%s/actions/runs/%s\n- Cycle outcome: %s\n' \
            "$BODY" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}" \
            "$CYCLE_RESULT")

          # Truncate before passing to gh: GitHub caps issue bodies at
          # 65,536 chars. A noisy week (many failures × verbose error
          # messages) can blow the cap; without truncation `gh issue
          # create --body "$BODY"` errors out and `set -e` kills the
          # step before the artifact upload runs. The artifact (uploaded
          # below regardless) always preserves the full digest.
          MAX_BODY_BYTES=60000
          if [ "${#BODY}" -gt "$MAX_BODY_BYTES" ]; then
            BODY="${BODY:0:$MAX_BODY_BYTES}

          [body truncated to ${MAX_BODY_BYTES} chars; full digest in workflow artifact]"
          fi

          # Find or create the sticky issue.
          #
          # IMPORTANT: We fetch ALL matches via `.[].number` (NOT the
          # zero-index variant) so we can detect duplicates. The previous
          # logic silently picked the first issue when 2+ were open
          # (manual operator action OR success-then-close race), dropping
          # the digest comment for the rest. We now fail the step with a
          # triage message and leave it to the operator to manually close
          # duplicates before next run:
          #
          #   gh issue list --label weekly-cycle-digest --state open
          #   gh issue close <duplicate-number>
          #
          # Recovery: re-run the workflow once the label has at most one
          # open issue.
          EXISTING_NUMBERS=$(gh issue list --label weekly-cycle-digest --state open --json number --jq '.[].number' || true)
          EXISTING_COUNT=0
          if [ -n "$EXISTING_NUMBERS" ]; then
            EXISTING_COUNT=$(printf '%s\n' "$EXISTING_NUMBERS" | wc -l | tr -d ' ')
          fi
          if [ "$EXISTING_COUNT" -ge 2 ]; then
            echo "::error::Multiple weekly-cycle-digest issues found (${EXISTING_COUNT}); manual triage required: gh issue list --label weekly-cycle-digest --state open"
            exit 1
          fi
          EXISTING=""
          if [ "$EXISTING_COUNT" -eq 1 ]; then
            EXISTING="$EXISTING_NUMBERS"
          fi

          if [ "$CYCLE_RESULT" = "success" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY"
              gh issue close "$EXISTING" --comment "All clear — closing sticky digest issue."
            else
              # Create + immediately close on success — the issue serves as a
              # historical record but doesn't hold the operator's attention.
              NEW_URL=$(gh issue create \
                --title "Weekly lifecycle digest — $(date -u +%Y-%m-%d)" \
                --label weekly-cycle-digest \
                --body "$BODY")
              # gh issue create prints the URL on stdout; extract the
              # trailing issue number to avoid re-querying the list (which
              # would re-trigger the duplicate-detection branch).
              NEW_NUM=${NEW_URL##*/}
              if [ -n "$NEW_NUM" ]; then
                gh issue close "$NEW_NUM"
              fi
            fi
          else
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY"
            else
              gh issue create \
                --title "Weekly lifecycle digest — $(date -u +%Y-%m-%d) (FAILED)" \
                --label weekly-cycle-digest \
                --body "$BODY"
            fi
          fi

      - name: Upload weekly-cycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-cycle-${{ github.run_id }}
          path: |
            digest.md
            weekly-cycle-result.json
          retention-days: 90

      - name: Surface cycle failure to workflow status
        if: steps.cycle.outcome == 'failure'
        run: |
          echo "::error::One or more cycle invocations failed; sticky digest issue stays open."
          exit 1
