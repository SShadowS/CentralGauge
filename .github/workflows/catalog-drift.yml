name: Daily catalog drift probe

# Probes the production /api/v1/health/catalog-drift endpoint daily and
# fails (creating a workflow failure) when drift > 0. P6 Task E2.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install site deps
        run: cd site && npm ci
      - name: Run catalog-drift invariant
        env:
          CI_PROD_PROBE: '1'
        run: cd site && npx vitest run --config vitest.build.config.ts tests/build/catalog-drift-invariant.test.ts
