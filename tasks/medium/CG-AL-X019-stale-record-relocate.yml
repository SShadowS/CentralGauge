description: >-
  Create codeunit "CG X019 Processor" (ID 71080) with Access = Internal and:

      procedure RecalcAndGetAmount(RefID: Guid): Integer

  The existing "CG X019 Doc" table (ID 69770, fields "No." (Code[20],
  primary key), "Ref ID" (Guid), and "Amount" (Integer)) holds documents,
  each identified by a "Ref ID" value.

  The existing "CG X019 Refresher" codeunit (ID 69771) provides:

      procedure Recalc(RefID: Guid)

  which recalculates the "CG X019 Doc" record identified by that RefID.

  RecalcAndGetAmount must locate the "CG X019 Doc" record for RefID, run
  Refresher.Recalc(RefID) on it, and then supply that document's current
  "Amount" value.
