description: >-
  Create codeunit 71160 "CG X027 Extractor" with Access = Internal, exposing:

      procedure ExtractDigits(Value: Text): Integer

  ExtractDigits returns the integer formed by concatenating every digit
  character found in Value, in the order they appear, and converting the
  result to an integer. For example, ExtractDigits('INV0042X') returns 42.
