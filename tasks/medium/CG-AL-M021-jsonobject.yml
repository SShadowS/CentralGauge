id: CG-AL-M021
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create an AL codeunit named "CG JSON Config Handler" with ID 70121 that
  builds, parses, and merges JSON configuration objects.

  1. Procedure "ParseJsonConfig" that takes Text parameter JsonText and returns
     a JsonObject. The procedure must call JsonObject.ReadFrom on the input. If
     parsing fails, throw an error with message
     "Invalid JSON configuration: " followed by JsonText.

  2. Procedure "CreateJsonFromSettings" that takes Dictionary of [Text, Text]
     parameter Settings and returns a JsonObject. For each entry in the
     dictionary, add a property to the returned JsonObject where the dictionary
     key becomes the JSON property name and the dictionary value becomes the
     JSON property value (stored as Text).

  3. Procedure "MergeJsonConfigs" that takes JsonObject parameter BaseJson and
     JsonObject parameter OverrideJson and returns a JsonObject. The merged
     result must contain every top-level key from BaseJson and every top-level
     key from OverrideJson; when the same key exists in both, the value from
     OverrideJson wins. The merge is shallow (top-level keys only).

  4. Procedure "GetStringValue" that takes JsonObject parameter Json and Text
     parameter JsonKey and returns Text. If the key exists in Json, return its
     value as Text using JsonValue.AsText. If the key does not exist, return an
     empty string.

  5. Procedure "GetIntValue" that takes JsonObject parameter Json and Text
     parameter JsonKey and returns Integer. If the key exists in Json, return
     its value as Integer using JsonValue.AsInteger. If the key does not
     exist, return 0.

  Include Access = Public on the codeunit.
metadata:
  category: data-exchange
  tags: [json, codeunit, procedure]
expected:
  compile: true
  testApp: tests/al/medium/CG-AL-M021.Test.al
  testCodeunitId: 80021
metrics:
  - compile_pass
  - tests_pass
  - pass_attempt
