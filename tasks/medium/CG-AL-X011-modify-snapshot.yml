description: >-
  Create codeunit "CG X011 Modifier" (ID 71000) with Access = Internal and:

      procedure SetCViaUpdater(RecCode: Code[20]; NewC: Integer)

  Given a code identifying a row in the existing "CG X011 Record" table (ID
  69710, fields "Code" (Code[20], primary key), "A" (Integer), "B" (Integer),
  and "C" (Integer)), the procedure must invoke the existing "CG X011
  Updater" codeunit's Apply procedure (ID 69711, procedure Apply(RecCode:
  Code[20])) for that row, which applies its own updates to that row's "A"
  and "B" fields. After that call returns, the procedure must set that same
  row's "C" field to NewC and persist the change.
