description: >-
  Create codeunit "CG X011 Modifier" (ID 71000) with Access = Internal and:

      procedure SetCViaRefresher(RecCode: Code[20]; NewC: Integer)

  Given a code identifying a row in the existing "CG X011 Record" table (ID
  69710, fields "Code" (Code[20], primary key), "A" (Integer), "B" (Integer),
  and "C" (Integer)), the procedure must call the existing "CG X011
  Refresher" codeunit's Recalculate procedure (ID 69711, procedure
  Recalculate(RecCode: Code[20])) for that row, which recalculates that
  row's "A" and "B" fields. Once Recalculate finishes, the procedure must
  set that same row's "C" field to NewC and save the row.
