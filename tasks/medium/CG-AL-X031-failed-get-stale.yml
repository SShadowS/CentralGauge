description: >-
  Create codeunit "CG X031 Pricer" (ID 71200) with Access = Internal and:

      procedure TotalPrice(ItemNos: List of [Code[20]]): Integer

  The procedure must return the sum of the "Price" field, read from the
  existing "CG X031 Item" table (ID 69830, fields "No." (Code[20], primary
  key) and "Price" (Integer)), for every item number in ItemNos. An item
  number with no matching row in the table must contribute 0 to the sum.
