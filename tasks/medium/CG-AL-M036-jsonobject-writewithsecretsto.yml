id: CG-AL-M036
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create an AL codeunit named "CG WriteWithSecrets Demo" with ID 70036 that uses the runtime-15.1 (BC 2025 Wave 1) JsonObject.WriteWithSecretsTo method to inject SecretText values into a JSON template at JPath-targeted positions and produce a SecretText output.

  The codeunit exposes two Public procedures:

  1. Procedure "WriteSecretsViaDict" that takes no parameters and returns Boolean. Inside the procedure:

     a. Declare a JsonObject and add two properties with placeholder string values: api_key = 'placeholder' and salt = 'placeholder'.

     b. Declare a Dictionary of [Text, SecretText] mapping the JPath expressions '$.api_key' and '$.salt' to two SecretText values 'actual-api-key' and 'actual-salt'.

     c. Declare a SecretText variable named Result.

     d. Call the JsonObject.WriteWithSecretsTo overload that accepts a Dictionary of [Text, SecretText] and a var SecretText, capturing the Boolean return.

     e. Return the Boolean.

  2. Procedure "WriteSecretsViaPath" that takes no parameters and returns Boolean. Inside the procedure:

     a. Declare a JsonObject and add one property with a placeholder string value: token = 'placeholder'.

     b. Declare a SecretText variable for the secret value (assign 'actual-token').

     c. Declare a SecretText variable named Result.

     d. Call the JsonObject.WriteWithSecretsTo overload that accepts a Text path, a SecretText value, and a var SecretText, passing '$.token' as the path. Capture the Boolean return.

     e. Return the Boolean.

  Include Access = Public on the codeunit.
metadata:
  category: data-exchange
  tags: [jsonobject, writewithsecretsto, secrettext, v15]
