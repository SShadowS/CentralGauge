id: CG-AL-X037
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X037 Poster" (ID 71260) with Access = Internal and:

      procedure PostBatch(BatchId: Integer; Value: Integer): Boolean

  Given a batch id and a value, PostBatch must create a row in the existing
  "CG X037 Ledger" table (ID 69890, fields "Batch Id" (Integer), "Step"
  (Integer), and "Amount" (Integer), primary key ("Batch Id", "Step")) with
  "Batch Id" = BatchId, "Step" = 0, and "Amount" = Value, and have the
  existing "CG X037 Worker" codeunit (ID 69891) attempt to complete that
  batch, reporting true when the Worker finished the batch and false when
  it did not, without letting a Worker failure interrupt PostBatch.

  On a true result, every "CG X037 Ledger" row the Worker wrote for that
  batch remains in the table. On a false result, the table must contain no
  "CG X037 Ledger" row for that batch, while rows for any other batch stay
  exactly as they were.
domains: [codeunits, error-handling]
metadata:
  category: error-transactions
  tags: [commit, codeunit-run, compensating-transaction, rollback, filter]
  difficulty: hard
  cohort: ado-trap-2026
  origin: fable-designed
expected:
