id: CG-AL-H044
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG H044 Buffer" (ID 70440) with Access = Public.

  Existing prereq table "CG H044 Doc" (ID 69440) - fields: "Code" Code[20] PK field 1; "Marker" Code[10] field 10.

  One procedure: `ResetBuffer(var Buffer: Record "CG H044 Doc")`.

  The procedure exists to clear the contents of a TEMPORARY record buffer that callers pass in. The body must:

  1. First, abort with an Error whose message text is exactly 'Buffer must be temporary.' if the caller passed a NON-temporary record. The check must use the AL Record method that returns whether the record variable was declared as `temporary`. Do NOT invent a method name; use the one method on Record that reports temporary status as a Boolean.
  2. Then, clear every row from Buffer.

  Forbidden mechanisms:
    - asserterror anywhere inside ResetBuffer.
    - Modifying the database (no DeleteAll(true), no Modify(true), no Insert, no Commit).
    - Looping (no repeat..until, no while, no foreach, no FindSet/FindFirst).
    - Re-reading or re-getting Buffer from the database (no Buffer.Get, no SetRange, no FindSet/FindFirst).
    - Using SystemId, ChangeCompany, RecordRef, or DataTransfer.
    - Using `Rec` (the parameter is named `Buffer`).

