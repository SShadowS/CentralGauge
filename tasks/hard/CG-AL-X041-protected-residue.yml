id: CG-AL-X041
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X041 Clerk" (ID 71300) with Access = Internal and:

      procedure PostDoc(BatchId: Integer; Value: Integer): Boolean

  Given a batch id and a value, PostDoc must create a row in the existing
  "CG X041 Doc" table (ID 69930, fields "Batch Id" (Integer), "Line No."
  (Integer), Status (Option: Open, Posted), and "Amount" (Integer), primary
  key ("Batch Id", "Line No.")) with "Batch Id" = BatchId, "Line No." = 0,
  Status = Open, and "Amount" = Value, and have the existing "CG X041
  Worker" codeunit (ID 69931) attempt to complete that batch, reporting true
  when the Worker finished the batch and false when it did not, without
  letting a Worker failure interrupt PostDoc.

  On a true result, every "CG X041 Doc" row the Worker wrote for that batch
  remains in the table exactly as the Worker left it. On a false result,
  the table must contain no Open "CG X041 Doc" row for that batch, while
  any Posted row for that batch stays exactly as the Worker left it, and
  rows for any other batch stay exactly as they were.
domains: [codeunits, error-handling]
