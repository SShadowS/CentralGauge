description: >-
  Use the existing "CG X001 Publisher" codeunit (ID 69601), whose procedure
  Raise() raises an integration event, and the existing "CG X001 Audit Sub"
  codeunit (ID 69602), a manual event-subscriber to that event which
  increments a counter each time it observes the event firing.

  Create codeunit "CG X001 Worker" (ID 70900) with Access = Internal and:

      procedure RunAudited()

  When RunAudited is called, the "CG X001 Audit Sub" subscriber must observe
  the event raised by "CG X001 Publisher".Raise() during that call.
