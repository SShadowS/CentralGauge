id: CG-AL-X038
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X038 Scheduler" (ID 71270) with Access = Internal and:

      procedure RunQueue()

  The existing "CG X038 Task" table (ID 69900) has fields "Entry No."
  (Integer, primary key), "Priority" (Integer), "Group Code" (Code[10]),
  "Runs" (Integer), and "Value" (Integer). The existing "CG X038 Dispatcher"
  codeunit (ID 69901) exposes:

      procedure Dispatch(EntryNo: Integer)

  RunQueue must dispatch every "CG X038 Task" row that exists at the moment
  RunQueue starts, exactly once each, in ascending "Priority" order as of
  that same moment, by calling Dispatch with that row's "Entry No.".
