id: CG-AL-H036
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG H036 Token Parser" (ID 70360) with Access = Public.

  Define one public procedure:

    procedure ParseAccessToken(JsonText: Text): SecretText

  Given a JsonText that is a JSON object containing a top-level string property named "access_token", ParseAccessToken extracts that property's text value and returns it as a SecretText. If JsonText cannot be parsed as a JSON object, or the "access_token" property is missing, ParseAccessToken returns a SecretText whose IsEmpty() is true.

  Inside ParseAccessToken: the extracted plaintext token MUST NOT be assigned to any Text or Code variable other than the JsonToken's underlying value, MUST NOT be passed to StrSubstNo or to any other procedure as a Text argument, and MUST NOT be concatenated. The conversion from the parsed JSON value to the SecretText return value must use a single platform call that yields a SecretText directly.

  No other procedures, triggers, fields, or objects.

metadata:
