id: CG-AL-X035
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X035 Runner" (ID 71240) with Access = Internal and:

      procedure TryProcess(No: Integer): Boolean

  Given a whole number No, TryProcess must create a row in the existing
  "CG X035 Attempt" table (ID 69870, fields "No." (Integer, primary key),
  "Result" (Integer), and "Processed" (Boolean)) with that "No.", then invoke
  the existing "CG X035 Engine" codeunit (ID 69871) so it processes that row.

  The Engine may complete successfully, or it may raise an error while
  processing the row; either outcome must not propagate out of TryProcess.
  TryProcess returns true when the Engine successfully processed the row, and
  false otherwise. Regardless of the outcome, the "CG X035 Attempt" row for
  No must still be present in the table afterward.
domains: [codeunits, error-handling]
