id: CG-AL-X035
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X035 Runner" (ID 71240) with Access = Internal and:

      procedure TryProcess(No: Integer): Boolean

  Given a whole number No, TryProcess must create a row in the existing
  "CG X035 Entry" table (ID 69870, fields "No." (Integer, primary key),
  "Result" (Integer), and "Processed" (Boolean)) with that "No.", invoke the
  existing "CG X035 Worker" codeunit (ID 69871) so it processes that row,
  catching any error the Worker raises so it never leaves TryProcess,
  returning true when the Worker finished the row and false when it errored,
  while leaving the row in the table either way.
domains: [codeunits, error-handling]
metadata:
  category: error-transactions
  tags: [commit, codeunit-run, tryfunction, write-transaction, error-tolerance]
  difficulty: hard
