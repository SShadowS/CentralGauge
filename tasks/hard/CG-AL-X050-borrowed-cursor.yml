id: CG-AL-X050
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG X050 Teller" (ID 71390) with Access = Internal and:

      procedure BatchDigest(BatchId: Integer): Integer

  The enum "CG X050 Entry Kind" (ID 69990) already exists with values Normal
  and Cancelled. The table "CG X050 Entry" (ID 69991) already exists, with
  fields "Entry No." (Integer, primary key), "Batch Id" (Integer), Kind (the
  enum above), and Amount (Integer).

  The codeunit "CG X050 Router" (ID 69992) already exists with:

      procedure Prepare(BatchId: Integer; var Entry: Record "CG X050 Entry")

  A batch must be prepared through the Router before it may be read;
  Prepare leaves Entry positioned on the batch's anchor entry.

  BatchDigest must prepare the batch, then return: the anchor entry's
  Amount times 1000, plus the sum of Amount over every entry of the batch,
  plus the Amount of the batch's newest entry (the entry with the highest
  "Entry No.") times 10.
domains: [codeunits, tables]
