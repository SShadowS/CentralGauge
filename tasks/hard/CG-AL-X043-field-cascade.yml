description: >-
  Add a field named "CG Ref Code" (Code[20]) to the Purchase Header.

  When a purchase invoice is posted, whatever value that field held on the
  header at posting time must be present on the resulting posted Vendor
  Ledger Entry and on the payables G/L Entry that the posting produces for
  that vendor.
