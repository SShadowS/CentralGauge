id: CG-AL-H046
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG H046 Item List" (ID 70460) with Access = Public.

  Existing prereq table "CG H046 Sample Item" (ID 69460) - fields: "No." Code[20] PK field 1; "Description" Text[50] field 10. The prereq seeds three rows on install: ('I1','Alpha'), ('I2','Beta'), ('I3','Gamma').

  One procedure: `BuildItemList(var Item: Record "CG H046 Sample Item"): Text`.

  Iterate the Item record set with FindSet/Next. For each row, append exactly one line of the form `<No.>,<Description>` (formatted with StrSubstNo using the literal `'%1,%2'` template) to a single in-memory text-buffer instance using the buffer's append-line method. After the loop ends, return the buffer's accumulated content as a Text.

  The buffer must be the AL platform data type designed for incremental string append inside loops with O(N) total cost - NOT a Text variable concatenated with `+`/`+=`, NOT a List of [Text] with later `Concat` / `JoinStr`, NOT a TextStream / OutStream.

  Forbidden mechanisms:
    - `Result += ...`, `Result := Result + ...`, or any `+`-style concatenation onto a Text variable inside the loop.
    - List of [Text] / Array of Text accumulators.
    - Calling StrSubstNo with a multi-line template that pre-builds the whole list outside the loop.
    - InStream / OutStream / TextStream-based assembly.

metadata:
  category: performance
  tags: [textbuilder, string-assembly]
