id: CG-AL-H016
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create an AL codeunit named "CG Secure Storage" with ID 70016 that demonstrates SecretText handling:

  1. Procedure "StoreApiKey" that takes a SecretText parameter named ApiKey and stores it
     in IsolatedStorage using DataScope::Module. Use key 'CG_API_KEY'. Does not return anything.

  2. Procedure "RetrieveApiKey" that retrieves the stored key from IsolatedStorage
     and returns it as SecretText.

  3. Procedure "BuildAuthHeader" that takes a var HttpClient parameter named Client and a
     SecretText parameter named ApiKey. Add an Authorization header to Client using
     SecretStrSubstNo('Bearer %1', ApiKey). Returns Boolean: true if the header was added,
     false otherwise.

  4. Procedure "ValidateCredentials" that takes a SecretText parameter named ApiKey and
     returns Boolean. Return false when ApiKey.IsEmpty() is true; otherwise return true.

metadata:
  category: error-handling
  tags: [secrettext, codeunit, procedure]
expected:
  compile: true
  testApp: tests/al/hard/CG-AL-H016.Test.al
  testCodeunitId: 80017
metrics:
  - compile_pass
  - tests_pass
  - pass_attempt
