max_attempts: 2
description: >-
  Create codeunit "CG X052 Agent" (ID 71410) with Access = Internal and:

      procedure SetTerms(No: Code[20]; OfferedRate: Integer; NewQty: Integer)

  The existing "CG X052 Quote" table (ID 69100) has fields "No." (Code[20],
  primary key), Qty, Rate, Fee, and Total, all Integer except "No.". Two
  rules already run on this table: setting Qty adjusts it under the table's
  own packaging rule and updates Fee and Total from the adjusted Qty and
  current Rate; setting Rate computes a new Rate from the given value and
  the current Qty, then updates Total from the new Rate.

  SetTerms applies NewQty and OfferedRate to the row for No., after which
  its Rate, Fee, and Total must all be consistent with its final (adjusted)
  Qty.
