id: CG-AL-H031
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create a codeunit named "CG H031 FlowField Calc" with ID 70231 that
  inspects and triggers FlowField calculations through FieldRef. The
  codeunit must operate against any table the caller passes in.

  Two prerequisite tables already exist in a separate prerequisite app and
  must NOT be redefined or recreated by your code. Do not declare these
  tables. Do not place any of your generated objects in the ID range
  69000-69999. Your codeunit lives in the ID range 70000-79999.

  The two prerequisite tables are:
  - "CG H031 Ledger" (ID 69310) with fields "Entry No." (Integer, primary
    key, field 1), "Group Code" (Code[10], field 2) and Amount (Decimal,
    field 10).
  - "CG H031 Group" (ID 69311) with fields Code (Code[10], primary key,
    field 1), "Total Amount" (Decimal FlowField summing CG H031
    Ledger.Amount where "Group Code" = "Code", field 10) and
    "Date Filter" (Date FlowFilter, field 20).

  1. Procedure "GetFieldClassText" that takes Integer parameter TableNo and
     Integer parameter FieldNo, returns Text. Open a RecordRef on TableNo,
     fetch the FieldRef for FieldNo and return Format(FieldRef.Class).
     Return empty text if the field does not exist on the table. Always
     close the RecordRef.

  2. Procedure "IsFlowField" that takes Integer parameter TableNo and
     Integer parameter FieldNo, returns Boolean. Return true if and only if
     the field exists on TableNo and its FieldClass is FlowField. Return
     false otherwise. Always close the RecordRef.

  3. Procedure "CalcIfFlowField" that takes var RecordRef parameter RecRef
     and Integer parameter FieldNo, returns Boolean. If the field exists
     and its FieldClass is FlowField, call CalcField on the FieldRef and
     return true. Otherwise do nothing and return false. Do not close
     RecRef inside this procedure.

  4. Procedure "GetCalculatedDecimal" that takes var RecordRef parameter
     RecRef and Integer parameter FieldNo, returns Decimal. Call
     CalcIfFlowField for the field, then return the FieldRef value as a
     Decimal. If the field does not exist or its value is not numeric,
     return 0.

  5. Procedure "IsFlowFilter" that takes Integer parameter TableNo and
     Integer parameter FieldNo, returns Boolean. Return true only when the
     field's FieldClass is FlowFilter. Return false otherwise (including
     missing fields and FlowFields). Always close the RecordRef.

  6. Procedure "GetClassOrdinal" that takes Integer parameter TableNo and
     Integer parameter FieldNo, returns Integer. Return 0 for Normal,
     1 for FlowField and 2 for FlowFilter. Return -1 if the field does not
     exist. Always close the RecordRef.

  7. Procedure "SumFieldByFilter" that takes Integer parameter TableNo,
     Integer parameter FilterFieldNo, Variant parameter FilterValue and
     Integer parameter SumFieldNo, returns Decimal. Open a RecordRef on
     TableNo. Retrieve a FieldRef for FilterFieldNo and apply an equality
     filter using FilterValue. Then iterate the resulting record set and
     accumulate the SumFieldNo FieldRef value as a Decimal across every
     matching row. Return the total. Return 0 when no rows match. Always
     close the RecordRef.

  Include Access = Public on the codeunit.
domains: [flowfields, codeunits]
metadata:
  category: advanced-patterns
  tags: [recordref, fieldref, flowfield, calcfield, fieldclass]
expected:
