id: CG-AL-H035
prompt_template: code-gen.md
fix_template: bugfix.md
max_attempts: 2
description: >-
  Create codeunit "CG H035 Auth" (ID 70350) with Access = Public.

  Define one public procedure:

    procedure AddApiKeyHeader(var Request: HttpRequestMessage; ApiKey: SecretText): Boolean

  AddApiKeyHeader adds a header named 'X-Api-Key' to Request whose value is the secret in ApiKey, and returns the Boolean result of the underlying header-add operation.

  Tests probe Request afterwards through HttpHeaders.ContainsSecret('X-Api-Key'); that call must report the header as present.

metadata:
  category: error-handling
  tags: [secrettext, httpclient, httpheaders]
expected:
