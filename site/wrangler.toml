name = "centralgauge"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]
account_id = "22c8fbe790464b492d9b178cc0f9255b"

[vars]
LOG_LEVEL = "info"
SITE_BASE_URL = "https://centralgauge.sshadows.workers.dev"
FLAG_PRINT_STYLESHEET = "on"
FLAG_TRAJECTORY_CHARTS = "on"       # P5.3 carry — flag interface defined in P5.3 but env var never landed
FLAG_CMD_K_PALETTE = "on"           # P5.4
FLAG_SSE_LIVE_UPDATES = "on"        # P5.4
FLAG_OG_DYNAMIC = "on"              # P5.4
FLAG_DENSITY_TOGGLE = "on"          # P5.4
FLAG_RUM_BEACON = "on"              # P5.4
CF_WEB_ANALYTICS_TOKEN = ""    # empty until `wrangler secret put CF_WEB_ANALYTICS_TOKEN` runs

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# D1 database — IDs filled in by setup script (Task 3)
[[d1_databases]]
binding = "DB"
database_name = "centralgauge"
database_id = "46b61074-4d6b-4ec7-84cf-b0fddb0d034f"
migrations_dir = "migrations"

# R2 bucket for content-addressed blobs
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "centralgauge-blobs"

# KV namespace for leaderboard cache.
# NOTE: Leaderboard read cache moved to Cache API (caches.default) and the
# rate limiter moved to the [[unsafe.bindings]] ratelimit binding below to
# avoid the 1000-puts/day free-tier KV write quota. The CACHE namespace is
# retained for any residual incidental use; remove once fully unused.
[[kv_namespaces]]
binding = "CACHE"
id = "4cb7accbc2884bc6bab9a4de1fff134b"

# Workers Rate Limiting binding (free tier, atomic, sliding-window). Replaces
# the previous KV-backed rate limiter so write-method API requests no longer
# burn a KV put each. namespace_id is a worker-local identifier; pick any
# unused integer (Cloudflare uses it to scope counters per binding).
[[unsafe.bindings]]
name = "RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Durable Object for SSE fan-out
[[durable_objects.bindings]]
name = "LEADERBOARD_BROADCASTER"
class_name = "LeaderboardBroadcaster"

[[migrations]]
tag = "v1"
# LeaderboardBroadcaster is in-memory only (Set<WritableStreamDefaultWriter>
# + recent BroadcastEvent[]) and never writes to state.storage. On the
# Cloudflare free plan, however, all new DO classes MUST be declared with
# `new_sqlite_classes` — `new_classes` (KV-backed storage) requires the
# Workers Paid plan. We pay the SQLite-WAL cost locally in exchange for
# being deployable without a billing tier bump.
new_sqlite_classes = ["LeaderboardBroadcaster"]

# Cron trigger: nightly D1 -> R2 backup at 02:00 UTC. The handler is the
# `scheduled` named export in `src/hooks.server.ts`.
[triggers]
crons = ["0 2 * * *"]
