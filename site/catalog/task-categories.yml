# Task taxonomy — authoritative for the SITE only (UI + analysis).
# NOT part of the task_set hash: editing this file + re-syncing never
# invalidates a benchmark or forces a re-bench.
# groups: mutually exclusive (one per task). tags: cross-cutting facets
# (0..N), content-derived. Both are filterable.

groups:
  - slug: data-modeling
    name: Data Modeling
    description: Tables, enums, fields, table extensions, keys, and FlowFields.
  - slug: pages-ui
    name: Pages, Reports & UI
    description: Pages, page extensions, customizations, system parts, and reports.
  - slug: business-logic
    name: Codeunits & Business Logic
    description: Procedures, calculations, string/text ops, and control flow.
  - slug: interfaces-events
    name: Interfaces & Events
    description: Interfaces, event publishers/subscribers, integration events.
  - slug: error-transactions
    name: Errors & Transactions
    description: ErrorInfo, try-functions, commit/rollback, permissions, collectible errors.
  - slug: integration-serialization
    name: Integration & Serialization
    description: JSON, XML, HTTP/web services, SecretText, base64.
  - slug: reflection-datatransfer
    name: Reflection & Data Transfer
    description: RecordRef/FieldRef, DataTransfer, upgrade tags.
  - slug: records-runtime
    name: Records & Runtime
    description: xRec, temporary tables, record marks, filter groups.
  - slug: queries-performance
    name: Queries & Performance
    description: Query objects, SIFT, caching, single-instance.

